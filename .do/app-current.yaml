alerts:
- rule: DEPLOYMENT_FAILED
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: web
    match:
      path:
        prefix: /
name: blackglass
region: lon
services:
- build_command: npm ci && npm run build
  environment_slug: node-js
  envs:
  - key: NODE_ENV
    scope: RUN_AND_BUILD_TIME
    value: production
  - key: NEXT_PUBLIC_APP_URL
    scope: RUN_AND_BUILD_TIME
    value: https://blackglass-j9imo.ondigitalocean.app
  - key: NEXT_PUBLIC_USE_MOCK
    scope: RUN_AND_BUILD_TIME
    value: "false"
  - key: NEXT_PUBLIC_API_URL
    scope: RUN_AND_BUILD_TIME
  - key: AUTH_REQUIRED
    scope: RUN_TIME
    value: "false"
  - key: COLLECTOR_HOST_1
    scope: RUN_TIME
    value: ""
  - key: COLLECTOR_HOST_1_NAME
    scope: RUN_TIME
    value: ""
  - key: COLLECTOR_USER
    scope: RUN_TIME
    value: blackglass
  github:
    branch: main
    deploy_on_push: true
    repo: thevenomv/blackglass-console
  health_check:
    failure_threshold: 6
    http_path: /api/health
    initial_delay_seconds: 60
    period_seconds: 10
    port: 3000
    success_threshold: 1
    timeout_seconds: 5
  http_port: 3000
  instance_count: 1
  instance_size_slug: basic-xxs
  name: web
  run_command: npm run start
  source_dir: /
