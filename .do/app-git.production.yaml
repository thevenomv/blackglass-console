# BLACKGLASS — DigitalOcean App Platform (GitHub → build on DO)
#
# Repo defaults match deployed BLACKGLASS; replace REGION / hostname if needed.
#
# Apply:
#   doctl apps create --spec .do/app-git.production.yaml
#   doctl apps update <app-id> --spec .do/app-git.production.yaml
#
# After first deploy, copy the default HTTPS URL into NEXT_PUBLIC_* (see env table).

alerts:
  - rule: DEPLOYMENT_FAILED
name: blackglass-production
region: lon
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
services:
  - name: web
    github:
      # Fork / new app: set to "<github_owner>/<repo>" for DO’s GitHub integration.
      repo: thevenomv/blackglass-console
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 3000
    source_dir: /
    build_command: npm ci && npm run build
    run_command: npm run start
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    envs:
      # --- Build + runtime (NEXT_PUBLIC_* inlined by Next at build; keep in sync across redeploys)
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_APP_URL
        value: https://YOUR_PRODUCTION_HOSTNAME
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_USE_MOCK
        value: "false"
        scope: RUN_AND_BUILD_TIME
      # Optional: external API base (leave empty for same-origin /api/v1 on this app)
      - key: NEXT_PUBLIC_API_URL
        value: ""
        scope: RUN_AND_BUILD_TIME
      # --- Runtime-only (server / Route Handlers)
      - key: AUTH_REQUIRED
        value: "true"
        scope: RUN_TIME
      # Console session HMAC — set in DO as SECRETS (never commit a real value).
      - key: AUTH_SESSION_SECRET
        value: ""
        scope: RUN_TIME
        type: SECRET
      # --- Push-ingest agent (alternative to SSH pull collector)
      # When BLACKGLASS runs on DO App Platform, its egress traffic to
      # other user-owned Droplets is silently blackholed by the DO network
      # fabric — meaning the SSH pull collector cannot reach those hosts
      # even when their firewall, sshd, and routing are healthy. The push
      # agent (scripts/blackglass-agent.sh) inverts the flow: the host
      # POSTs to /api/v1/ingest/agent over plain HTTPS through DO's load
      # balancer, which works regardless of the egress restriction.
      #
      # Auth model:
      #  - INGEST_API_KEY     — shared bearer secret (any agent may use it).
      #  - INGEST_HOST_KEYS_JSON — JSON map {"hostId":"per-host-secret"}
      #    PREFERRED — compromise of one host's key does not affect others.
      #
      # Set both as SECRET in the DO console after applying this spec.
      - key: INGEST_API_KEY
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: INGEST_HOST_KEYS_JSON
        value: ""
        scope: RUN_TIME
        type: SECRET
      # The lab-health probe checks for agent freshness under this hostId.
      # Must match BLACKGLASS_HOST_ID in /etc/blackglass-agent.env on the
      # demo VM. Defaults to "host-<COLLECTOR_HOST_1-with-dashes>".
      - key: LAB_AGENT_HOST_ID
        value: "host-167-99-59-55"
        scope: RUN_TIME
      # How recent an agent ingest must be to count as "lab is healthy".
      # 900 = 15 min, covers 3 missed 5-min runs.
      - key: LAB_AGENT_FRESH_WINDOW_SECONDS
        value: "900"
        scope: RUN_TIME
      # --- Demo VM collector
      # The canonical sales-demo VM is `blackglass-rustdesk-demo`
      # (167.99.59.55, nyc3) — the same Droplet operators screen-share into
      # via RustDesk during customer demos. Findings reach the console via
      # the BLACKGLASS push-agent on a 5-min systemd timer (App Platform
      # egress to user-owned Droplets is blocked, so SSH-pull won't work).
      - key: COLLECTOR_HOST_1
        value: "167.99.59.55"
        scope: RUN_TIME
      - key: COLLECTOR_HOST_1_NAME
        value: "blackglass-rustdesk-demo"
        scope: RUN_TIME
      # COLLECTOR_USER: SSH username on the target (default: blackglass)
      - key: COLLECTOR_USER
        value: blackglass
        scope: RUN_TIME
      # SSH_PRIVATE_KEY: PEM-encoded SSH private key (type: SECRET — fill after deploy)
      - key: SSH_PRIVATE_KEY
        value: ""
        scope: RUN_TIME
        type: SECRET
      # Optional: JIT secrets — set SECRET_PROVIDER to doppler or infisical and use provider
      # tokens instead of storing SSH_PRIVATE_KEY here (see docs/operator-guide.md §2c-b).
      # - SECRET_PROVIDER: doppler | infisical | env (default)
      # - DOPPLER_TOKEN / DOPPLER_PROJECT / DOPPLER_CONFIG, or Infisical machine identity vars
      # --- Persistence (mount a DO Volume on the service, then set these paths on the volume)
      # - key: BASELINE_STORE_PATH
      #   value: /data/blackglass/baselines.json
      #   scope: RUN_TIME
      # - key: DRIFT_HISTORY_PATH
      #   value: /data/blackglass/drift-history.json
      #   scope: RUN_TIME
      #
      # --- DigitalOcean Managed Database (recommended): PostgreSQL
      # Create a Managed DB cluster, allow App Platform trusted sources, then set as SECRET:
      # - key: DATABASE_URL
      #   value: postgresql://doadmin:...@db-host:25060/blackglass?sslmode=require
      #   scope: RUN_TIME
      #   type: SECRET
      # Apply: `npm run db:migrate` (drizzle/) for the canonical SaaS schema; docs/migrations/{001,002}.sql for the legacy single-tenant blackglass_audit / baselines / drift_history tables.
      #
      # Optional: same cluster with different schema, or separate DB for audit-only isolation:
      # - key: AUDIT_DATABASE_URL
      #   scope: RUN_TIME
      #   type: SECRET
      #
      # --- DigitalOcean Managed Redis / Valkey (multi-instance rate limits + BullMQ scan queue)
      # Fill in the DO console after provisioning: scripts/provision-do-redis.ps1
      - key: RATE_LIMIT_REDIS_URL
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_QUEUE_URL
        value: ""
        scope: RUN_TIME
        type: SECRET

# ---------------------------------------------------------------------------
# Pre-deploy migration job
#
# Runs `npm run db:migrate` BEFORE the new web/worker images are promoted to
# active. Prevents the class of "table does not exist" 500s that happen when
# code is deployed but a Drizzle migration has not been applied yet.
#
# - kind: PRE_DEPLOY  → must succeed before the deploy is promoted
# - DATABASE_URL must be set as a SECRET on this job (same value as the web
#   service). Bind it via the DO console after applying this spec.
# - The runner is column-level idempotent (see scripts/ops/apply-migrations.mjs)
#   so re-running it on a deploy with no new migrations is a fast no-op.
# ---------------------------------------------------------------------------
jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    github:
      repo: thevenomv/blackglass-console
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    source_dir: /
    build_command: npm ci
    run_command: npm run db:migrate
    envs:
      - key: DATABASE_URL
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: PGSSLMODE
        value: no-verify
        scope: RUN_TIME

# ---------------------------------------------------------------------------
# Scan worker — BullMQ consumer; decouples SSH fan-out from the web tier.
# Activate after provisioning Redis (scripts/provision-do-redis.ps1) and
# setting REDIS_QUEUE_URL above. Uses the same GitHub source as the web service
# but runs `npm run worker` and carries no HTTP port.
# ---------------------------------------------------------------------------
workers:
  - name: scan-worker
    github:
      repo: thevenomv/blackglass-console
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: professional-xs
    source_dir: /
    build_command: npm ci
    run_command: npm run worker
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: REDIS_QUEUE_URL
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: WORKER_CONCURRENCY
        value: "4"
        scope: RUN_TIME
      - key: COLLECTOR_HOST_1
        value: "167.99.59.55"
        scope: RUN_TIME
      - key: COLLECTOR_HOST_1_NAME
        value: "blackglass-rustdesk-demo"
        scope: RUN_TIME
      - key: COLLECTOR_USER
        value: blackglass
        scope: RUN_TIME
      - key: SSH_PRIVATE_KEY
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: BASELINE_STORE_PATH
        value: ""
        scope: RUN_TIME
      # DO_SPACES_* — set if using Spaces-backed baseline storage
      - key: DO_SPACES_KEY
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_BUCKET
        value: ""
        scope: RUN_TIME
      - key: DO_SPACES_ENDPOINT
        value: ""
        scope: RUN_TIME
