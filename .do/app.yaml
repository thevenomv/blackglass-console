# DigitalOcean App Platform — GitHub Container Registry (GHCR) deploy.
#
# Prereqs:
# 1. Create a GitHub PAT with read:packages scope and add it as a DO app secret:
#    doctl apps update <app-id> --secret GHCR_TOKEN=<pat>
# 2. Build & push images:
#    docker build -t ghcr.io/<github-org>/blackglass-console:latest -f Dockerfile .
#    docker build -t ghcr.io/<github-org>/blackglass-worker:latest -f Dockerfile.worker .
#    echo <pat> | docker login ghcr.io -u <github-user> --password-stdin
#    docker push ghcr.io/<github-org>/blackglass-console:latest
#    docker push ghcr.io/<github-org>/blackglass-worker:latest
# 3. Update the registry_credentials below with your GitHub org/username, then:
#    doctl apps create --spec .do/app.yaml   (or: doctl apps update <app-id> --spec .do/app.yaml)
#
# After first deploy, set NEXT_PUBLIC_APP_URL to your live HTTPS URL and rebuild the image
# (Next.js inlines NEXT_PUBLIC_* at build time).

alerts:
  - rule: DEPLOYMENT_FAILED
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
name: blackglass-console
region: nyc
services:
  - name: web
    image:
      registry_type: GHCR
      registry: ghcr.io
      repository: GITHUB_ORG/blackglass-console
      tag: latest
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: AUTH_REQUIRED
        value: "false"
        scope: RUN_TIME
      # Demo / production collector host
      - key: COLLECTOR_HOST_1
        value: "167.99.59.55"
        scope: RUN_TIME
      - key: COLLECTOR_HOST_1_USER
        value: "blackglass"
        scope: RUN_TIME
      - key: COLLECTOR_HOST_1_NAME
        value: "Demo Server"
        scope: RUN_TIME
      - key: COLLECTOR_HOST_1_PORT
        value: "2222"
        scope: RUN_TIME
      # Distributed rate limits — set after provisioning: .\scripts\provision-do-redis.ps1
      # When unset, limits are in-memory per-instance (adequate for single-instance deploys).
      - key: RATE_LIMIT_REDIS_URL
        value: ""
        scope: RUN_TIME
        type: SECRET

# Scan worker — BullMQ consumer; processes SSH fan-out jobs off the web tier.
# Requires REDIS_QUEUE_URL (same Redis as RATE_LIMIT_REDIS_URL or a dedicated instance).
# Build: .\scripts\do-docker-push.ps1 -RegistryName <name> -BuildWorker
# Apply: doctl apps update <app-id> --spec .do/app.yaml
workers:
  - name: scan-worker
    image:
      registry_type: GHCR
      registry: ghcr.io
      repository: GITHUB_ORG/blackglass-worker
      tag: latest
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: REDIS_QUEUE_URL
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: WORKER_CONCURRENCY
        value: "4"
        scope: RUN_TIME
