# DigitalOcean App Platform — Container Registry (DOCR) deploy.
#
# Prereqs:
# 1. Create registry: .\scripts\provision-docr.ps1  (or: doctl registry create blackglass)
# 2. Set DIGITALOCEAN_ACCESS_TOKEN in your shell (Personal Access Token with read/write).
# 3. Build & push image: .\scripts\do-docker-push.ps1 -RegistryName blackglass
# 4. If you used a different registry name, update the `registry:` fields below, then:
#    doctl apps create --spec .do/app.yaml
#    # updates: doctl apps update <app-id> --spec .do/app.yaml
#
# After first deploy, set NEXT_PUBLIC_APP_URL to your live HTTPS URL and rebuild the image
# (Next.js inlines NEXT_PUBLIC_* at build time).

alerts:
  - rule: DEPLOYMENT_FAILED
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
name: blackglass-console
region: nyc
services:
  - name: web
    image:
      registry_type: DOCR
      registry: blackglass
      repository: blackglass-console
      tag: latest
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: AUTH_REQUIRED
        value: "false"
        scope: RUN_TIME
      # Distributed rate limits — set after provisioning: .\scripts\provision-do-redis.ps1
      # When unset, limits are in-memory per-instance (adequate for single-instance deploys).
      - key: RATE_LIMIT_REDIS_URL
        value: ""
        scope: RUN_TIME
        type: SECRET

# Scan worker — BullMQ consumer; processes SSH fan-out jobs off the web tier.
# Requires REDIS_QUEUE_URL (same Redis as RATE_LIMIT_REDIS_URL or a dedicated instance).
# Build: .\scripts\do-docker-push.ps1 -RegistryName <name> -BuildWorker
# Apply: doctl apps update <app-id> --spec .do/app.yaml
workers:
  - name: scan-worker
    image:
      registry_type: DOCR
      registry: blackglass
      repository: blackglass-worker
      tag: latest
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: REDIS_QUEUE_URL
        value: ""
        scope: RUN_TIME
        type: SECRET
      - key: WORKER_CONCURRENCY
        value: "4"
        scope: RUN_TIME
