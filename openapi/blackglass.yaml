openapi: 3.1.0
info:
  title: BLACKGLASS API
  version: 0.1.0
  description: >
    Operational integrity API — hosts, baselines, scans, drift findings,
    evidence bundles, and reports. Idempotent reads; scan jobs are asynchronous.

servers:
  - url: https://api.blackglass.invalid/v1
    description: Production (stub host)
  - url: https://console.blackglass.invalid/api/v1
    description: SaaS console API prefix (Next.js `/api/v1`, Clerk session)

tags:
  - name: Hosts
  - name: Baselines
  - name: Scans
  - name: Drift
  - name: Evidence
  - name: Reports
  - name: Ingest
  - name: Collector
  - name: Webhooks
  - name: API keys
  - name: Exports
  - name: Policies
  - name: Preferences
  - name: Remediations
  - name: Audit
  - name: Sandbox
  - name: Settings
  - name: Charon

paths:
  /api/health:
    servers:
      - url: https://console.blackglass.invalid
        description: Next.js app origin (not under `/v1`)
    get:
      tags: [Hosts]
      summary: Liveness, baseline store, collector diagnostics
      parameters:
        - name: probe
          in: query
          description: Pass `secrets` for a lightweight secret-backend reachability probe
          schema: { type: string, enum: [secrets] }
      responses:
        "200":
          description: Health JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string }
                  diagnostics_scope:
                    type: string
                    description: >
                      runtime_configuration = env/collector readiness only (no secret fetch).
                      With ?probe=secrets, adds secret_backend_reachability and includes secrets_probe.
                  baseline_store: { nullable: true }
                  collector: { type: object }
                  secrets_probe: { type: object, nullable: true }

  /fleet/snapshot:
    get:
      tags: [Hosts]
      summary: Fleet KPI snapshot including collector coverage
      responses:
        "200":
          description: Snapshot payload
          content:
            application/json:
              schema: { type: object }

  /audit/events:
    get:
      tags: [Hosts]
      summary: Recent audit entries (demo stub)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 80, maximum: 200 }
        - name: action
          in: query
          description: Case-insensitive substring match on audit action
          schema: { type: string }
        - name: since
          in: query
          description: ISO-8601 timestamp — only events on or after this instant
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Tail of audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        ts: { type: string, format: date-time }
                        action: { type: string }
                        detail: { type: string }
                        actor: { type: string, nullable: true }
                        scan_id: { type: string, nullable: true }
    post:
      tags: [Hosts]
      summary: Append audit entry (demo stub)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, detail]
              properties:
                action: { type: string }
                detail: { type: string }
                actor: { type: string }
                scan_id: { type: string, description: "Optional correlation with scan jobs" }
      responses:
        "201":
          description: Record created
        "400":
          description: Invalid body
        "429":
          description: Audit-append rate limit

  /hosts:
    get:
      tags: [Hosts]
      summary: List hosts in workspace
      security:
        - SessionCookie: []
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated hosts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Host" }
                  next_cursor: { type: string, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /baselines:
    get:
      tags: [Baselines]
      summary: List captured baselines (summary per host)
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  baselines:
                    type: array
                    items:
                      type: object
                      properties:
                        hostId: { type: string }
                        hostname: { type: string }
                        capturedAt: { type: string, format: date-time }
                        listenersCount: { type: integer }
                        usersCount: { type: integer }
                        servicesCount: { type: integer }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }
    post:
      tags: [Baselines]
      summary: Capture baselines for all configured collector hosts
      security:
        - SessionCookie: []
      description: >
        Collects SSH snapshots from every COLLECTOR_HOST_N in parallel. Saves each
        successful baseline; partial failures are listed under `failed`.
        When a database is configured, the handler returns 202 and runs capture in
        the background so upstream proxies (e.g. Cloudflare) do not time out;
        poll GET /baselines/capture-jobs/{jobId} until `status` is succeeded or failed.
      responses:
        "200":
          description: At least one host captured successfully (legacy sync mode without DATABASE_URL)
          content:
            application/json:
              schema:
                type: object
                required: [captured]
                properties:
                  captured:
                    type: array
                    items:
                      type: object
                      properties:
                        hostId: { type: string }
                        hostname: { type: string }
                        capturedAt: { type: string, format: date-time }
                        listenersCount: { type: integer }
                        usersCount: { type: integer }
                        servicesCount: { type: integer }
                        sudoers: {}
                        cronEntries:
                          type: array
                          items: { type: string }
                        sshConfig: {}
                        firewallActive: { type: boolean }
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        hostId: { type: string }
                        detail: { type: string }
        "202":
          description: Capture job accepted — poll capture-jobs for completion
          content:
            application/json:
              schema:
                type: object
                required: [job_id, status]
                properties:
                  job_id: { type: string, format: uuid }
                  status: { type: string, enum: [queued] }
        "502":
          description: Every host failed collection
        "503":
          description: Collector not configured (missing COLLECTOR_HOST_1 or SSH_PRIVATE_KEY)

  /baselines/capture-jobs/{jobId}:
    get:
      tags: [Baselines]
      summary: Poll async baseline capture job status
      security:
        - SessionCookie: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Job state
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  status:
                    type: string
                    enum: [queued, running, succeeded, failed]
                  captured: { type: array, items: { type: object } }
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        hostId: { type: string }
                        detail: { type: string }
                  error_detail: { type: string }
                  created_at: { type: string, format: date-time }
                  started_at: { type: string, format: date-time, nullable: true }
                  finished_at: { type: string, format: date-time, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Job not found }
        "429": { description: Rate limit exceeded }

  /hosts/{hostId}:
    get:
      tags: [Hosts]
      summary: Get host detail and latest posture summary
      security:
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/hostId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HostDetail" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Host not found }
        "429": { description: Rate limit exceeded }

  /hosts/{hostId}/baselines:
    get:
      tags: [Baselines]
      summary: List baseline snapshots for a host
      security:
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/hostId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Baseline" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

    post:
      tags: [Baselines]
      summary: Create baseline from latest successful scan
      security:
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/hostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label: { type: string }
                tags:
                  type: array
                  items: { type: string }
                scan_id: { type: string, description: Optional scan to pin; default latest }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Baseline" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden (trial_read_only or insufficient role) }
        "429": { description: Rate limit exceeded }

  /hosts/{hostId}/drift:
    get:
      tags: [Drift]
      summary: List drift findings for host (latest scan vs active baseline)
      security:
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/hostId"
        - name: severity
          in: query
          schema: { type: string, enum: [high, medium, low] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DriftFinding" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /drift/{findingId}:
    get:
      tags: [Drift]
      summary: Get drift finding detail (evidence excerpts)
      security:
        - SessionCookie: []
      parameters:
        - name: findingId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriftFinding" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Finding not found }
        "429": { description: Rate limit exceeded }

  /hosts/{hostId}/diff:
    get:
      tags: [Drift]
      summary: Unified baseline vs current structured diff
      security:
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/hostId"
        - name: baseline_id
          in: query
          schema: { type: string }
        - name: scan_id
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DiffResult" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Host or baseline not found }
        "429": { description: Rate limit exceeded }

  /evidence/bundles:
    post:
      tags: [Evidence]
      summary: Create evidence bundle export job
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: object
                  properties:
                    host_ids:
                      type: array
                      items: { type: string }
                    fleet_tags:
                      type: array
                      items: { type: string }
                time_range:
                  type: object
                  properties:
                    from: { type: string, format: date-time }
                    to: { type: string, format: date-time }
                include:
                  type: object
                  properties:
                    findings_json: { type: boolean, default: true }
                    summary_md: { type: boolean, default: true }
                    config_excerpts: { type: boolean, default: false }
                case_id: { type: string }
                notes: { type: string }
      responses:
        "202":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceBundleJob" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /evidence/bundles/{bundleId}:
    get:
      tags: [Evidence]
      summary: Get bundle job status or download URL when ready
      security:
        - SessionCookie: []
      parameters:
        - name: bundleId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceBundleJob" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Bundle not found }
        "429": { description: Rate limit exceeded }

  /api/v1/ingest/agent:
    servers:
      - url: https://console.blackglass.invalid
        description: Next.js app origin (not under `/v1`)
    post:
      tags: [Ingest]
      summary: Push-agent snapshot ingest
      description: >
        The single endpoint the `blackglass-agent.sh` push agent (or any
        compatible CI agent) calls to stream a host bundle over HTTPS. This is
        the pull-model alternative used when a host sits in a strict VPC the
        Blackglass collector cannot reach via SSH.

        Authentication is Bearer with the tenant's INGEST_API_KEY (set in
        Settings → Collectors & ingest, or the `INGEST_API_KEY` env var on
        self-hosted instances). An optional INGEST_HOST_KEYS_JSON map can
        narrow each key to a single hostId for blast-radius reduction.

        Successful responses are also consumed by the wizard at
        `/onboarding`; the `summary` and `next` blocks drive the live bundle
        preview and the deep-link to the host detail page.

        Granular failure codes (`bundle_truncated`, `bundle_missing_sections`,
        `host_quota_exceeded`, `host_tombstoned`, `drift_pipeline_failed`,
        etc.) come back via the `{ error, detail, remedy }` envelope so the
        agent and wizard can render specific next-steps instead of generic
        500s.
      security:
        - BearerIngestKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostSnapshot"
      responses:
        "200":
          description: Snapshot accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  stage:
                    type: string
                    enum: [bootstrap_baseline, ingest_ok]
                    description: bootstrap_baseline on first push, ingest_ok thereafter
                  hostId: { type: string }
                  capturedAt: { type: string, format: date-time }
                  bootstrap: { type: boolean }
                  driftEvents: { type: integer }
                  summary:
                    type: object
                    properties:
                      sections: { type: integer }
                      listeners: { type: integer }
                      users: { type: integer }
                      services: { type: integer }
                  next:
                    type: object
                    properties:
                      host_url: { type: string, format: uri }
                      next_action: { type: string, enum: [capture_baseline, review_findings] }
                      wizard_url: { type: string, format: uri }
        "400":
          description: Validation failed, malformed bundle, or missing critical sections
        "401":
          description: Missing or invalid Bearer token
        "403":
          description: Tenant ingest scope, host allowance, or tombstone blocked the snapshot
        "429":
          description: Rate limit exceeded for this hostId
        "502":
          description: Snapshot accepted locally but downstream drift pipeline failed
        "503":
          description: INGEST_API_KEY not configured on this instance

  /reports:
    post:
      tags: [Reports]
      summary: Generate integrity report
      security:
        - SessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                fleet_tags: { type: array, items: { type: string } }
                period: { type: string, description: ISO-8601 interval or preset }
                format: { type: string, enum: [markdown, pdf], default: pdf }
      responses:
        "202":
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id: { type: string }
                  status: { type: string, enum: [queued, running, ready, failed] }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }
    get:
      tags: [Reports]
      summary: List generated reports
      security:
        - SessionCookie: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        format: { type: string, enum: [markdown, pdf] }
                        status: { type: string, enum: [queued, running, ready, failed] }
                        created_at: { type: string, format: date-time }
                  next_cursor: { type: string, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }

  /scans:
    post:
      tags: [Scans]
      summary: Enqueue a fleet drift scan
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host_ids:
                  type: array
                  items: { type: string }
                  description: Empty array triggers full-fleet scan
      responses:
        "202":
          description: Scan job accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanJob" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden (trial_read_only or subscription_inactive) }
        "429": { description: Rate limit exceeded (24 per minute per IP) }
    get:
      tags: [Scans]
      summary: List recent scan jobs
      security:
        - SessionCookie: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ScanJob" }
                  next_cursor: { type: string, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /scans/{scanId}:
    get:
      tags: [Scans]
      summary: Get scan job status
      security:
        - SessionCookie: []
      parameters:
        - name: scanId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanJob" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Scan job not found }
        "429": { description: Rate limit exceeded (320 polls per minute per IP) }

  /drift:
    get:
      tags: [Drift]
      summary: List all drift events across fleet (flat, paginated)
      security:
        - SessionCookie: []
      parameters:
        - name: hostId
          in: query
          schema: { type: string }
          description: Filter to a specific host
        - name: lifecycle
          in: query
          schema:
            type: string
            enum: [new, triaged, accepted_risk, remediated, verified]
        - name: severity
          in: query
          schema:
            type: string
            enum: [high, medium, low]
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DriftFinding" }
                  total: { type: integer }
                  next_cursor: { type: string, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /evidence/bundles/{bundleId}/file:
    get:
      tags: [Evidence]
      summary: Download evidence bundle archive (binary)
      security:
        - SessionCookie: []
      parameters:
        - name: bundleId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Binary archive (.tar.gz or .zip)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Bundle not found or not yet ready }

  /collector/keys/rotate:
    post:
      tags: [Collector]
      summary: Rotate the collector ingest API key for this tenant
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  rotated: { type: boolean }
                  message: { type: string }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — owner or admin role required }
        "429": { description: Rate limit exceeded (5 per hour per IP) }

  /webhooks/test:
    post:
      tags: [Webhooks]
      summary: Send a test webhook delivery to the configured endpoint
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status_code: { type: integer }
                  latency_ms: { type: integer }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded (2 per minute per IP) }

  /api-keys:
    get:
      tags: [API keys]
      summary: List tenant API keys (metadata only)
      description: >
        Returns key metadata (id, label, scopes, createdAt, lastUsedAt, expiresAt).
        Raw key material is never returned after creation. Legacy mode (no Clerk
        organisation) returns an empty list.
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items: { $ref: "#/components/schemas/ApiKeyView" }
        "401": { description: Unauthenticated }
        "402": { description: Plan does not include API access }
        "403": { description: Forbidden — apikeys.manage required }
        "429": { description: Rate limit exceeded }
    post:
      tags: [API keys]
      summary: Create a new API key (raw key returned once)
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label: { type: string, minLength: 1, maxLength: 100 }
                scopes:
                  type: array
                  items: { type: string, minLength: 1, maxLength: 50 }
                  maxItems: 20
                  default: ["scans.run", "drift.read"]
                expiresInDays: { type: integer, minimum: 1, maximum: 3650, nullable: true }
      responses:
        "201":
          description: Key created; rawKey shown once
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    allOf:
                      - { $ref: "#/components/schemas/ApiKeyView" }
                      - type: object
                        properties:
                          rawKey: { type: string, description: Show to user once; never returned again }
        "400": { description: Validation failed or legacy mode (not_supported) }
        "401": { description: Unauthenticated }
        "402": { description: Plan does not include API access }
        "403": { description: Forbidden — apikeys.manage required }
        "429": { description: Rate limit exceeded }

  /api-keys/{id}:
    delete:
      tags: [API keys]
      summary: Revoke an API key
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: "^[\\w-]{36}$" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { description: invalid_id or legacy mode (not_supported) }
        "401": { description: Unauthenticated }
        "402": { description: Plan does not include API access }
        "403": { description: Forbidden }
        "404": { description: not_found }
        "429": { description: Rate limit exceeded }

  /api-keys/{id}/rotate:
    post:
      tags: [API keys]
      summary: Rotate an API key (old key sunsets after 24h)
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: "^[\\w-]{36}$" }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    allOf:
                      - { $ref: "#/components/schemas/ApiKeyView" }
                      - type: object
                        properties:
                          rawKey: { type: string }
                  sunsetAt: { type: string, format: date-time }
        "400": { description: invalid_id or legacy mode }
        "401": { description: Unauthenticated }
        "402": { description: Plan does not include API access }
        "403": { description: Forbidden }
        "404": { description: not_found }
        "429": { description: Rate limit exceeded }

  /exports:
    get:
      tags: [Exports]
      summary: List recent data export jobs
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  exports:
                    type: array
                    items: { $ref: "#/components/schemas/DataExportView" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — settings.write required }
        "429": { description: Rate limit exceeded }
    post:
      tags: [Exports]
      summary: Enqueue a new data export
      security:
        - SessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                deliverTo: { type: string, format: email, nullable: true }
      responses:
        "202":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DataExportView" }
        "400": { description: Validation failed or legacy mode (not_supported) }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /exports/{id}/download:
    get:
      tags: [Exports]
      summary: Download a ready export (redirect to signed URL or inline JSON)
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: "^[\\w-]{36}$" }
      responses:
        "200":
          description: Inline JSON attachment (when Spaces not configured)
          content:
            application/json: { schema: { type: object, additionalProperties: true } }
        "302":
          description: Redirect to a short-lived signed Spaces URL
        "400": { description: invalid_id or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: not_found }
        "409": { description: not_ready (still queued/running) }
        "410": { description: expired (artefact retention exceeded) }
        "429": { description: Rate limit exceeded }
        "500": { description: Internal error or no artefact bytes available }
        "503": { description: Spaces not configured (export_unavailable) }

  /policies:
    get:
      tags: [Policies]
      summary: List enabled drift policy rules for tenant
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items: { $ref: "#/components/schemas/PolicyRule" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — reports.view required }
        "429": { description: Rate limit exceeded }
    post:
      tags: [Policies]
      summary: Create a new drift policy rule
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category, conditionKey, conditionValue]
              properties:
                name: { type: string }
                category:
                  type: string
                  enum: [ssh, network_exposure, firewall, packages, integrity, identity, privilege_escalation, persistence]
                conditionKey: { type: string }
                conditionValue: { type: string }
                severity: { type: string, enum: [high, medium, low], default: high }
                enabled: { type: boolean, default: true }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy: { $ref: "#/components/schemas/PolicyRule" }
        "400": { description: Validation failed or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — policies.manage required }
        "429": { description: Rate limit exceeded }

  /policies/{id}:
    delete:
      tags: [Policies]
      summary: Delete a drift policy rule
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: "^[\\w-]{36}$" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { description: invalid_id or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: not_found }
        "429": { description: Rate limit exceeded }

  /preferences/sample-data:
    post:
      tags: [Preferences]
      summary: Toggle the per-browser sample-data overlay
      description: >
        Sets the bg-sample-data cookie controlling whether the dashboard
        renders the bundled sample fleet alongside live data. Per-browser only.
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
        "400": { description: validation_error or invalid_json }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }

  /remediations:
    get:
      tags: [Remediations]
      summary: List remediations or fetch one by drift event id
      description: >
        With ?driftEventId, returns a single remediation envelope; otherwise lists
        all remediations for the tenant. Accepts Bearer API keys with scope
        `drift.read` in addition to session auth.
      security:
        - SessionCookie: []
        - BearerIngestKey: []
      parameters:
        - name: driftEventId
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      remediation:
                        oneOf:
                          - { $ref: "#/components/schemas/RemediationView" }
                          - { type: "null" }
                  - type: object
                    properties:
                      remediations:
                        type: array
                        items: { $ref: "#/components/schemas/RemediationView" }
        "401": { description: Unauthenticated or invalid_api_key }
        "403": { description: Forbidden or missing_scope }
        "429": { description: Rate limit exceeded }

  /remediations/{id}/{action}:
    post:
      tags: [Remediations]
      summary: Approve or reject a remediation plan
      description: >
        Records the operator decision and notifies the configured remediator
        sidecar. Returns 502 (`remediator_upstream_error` or `remediator_unreachable`)
        if the sidecar fails — never 200-on-failure.
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, maxLength: 64 }
        - name: action
          in: path
          required: true
          schema: { type: string, enum: [approve, reject] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  remediation: { $ref: "#/components/schemas/RemediationView" }
                  notified: { type: boolean }
                  requestId: { type: string }
        "400": { description: invalid_id or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — drift.manage required }
        "404": { description: Unknown action or remediation not found }
        "429": { description: Rate limit exceeded }
        "502": { description: remediator_upstream_error or remediator_unreachable }

  /saas-audit:
    get:
      tags: [Audit]
      summary: Query tenant audit log with filters and cursor pagination
      security:
        - SessionCookie: []
      parameters:
        - name: action
          in: query
          description: Case-insensitive substring match on audit action
          schema: { type: string }
        - name: actor
          in: query
          description: Exact match on actor user id
          schema: { type: string }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: cursor
          in: query
          description: Exclusive upper-bound ISO timestamp for the next page
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/SaasAuditEventView" }
                  nextCursor: { type: string, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — evidence.view required }
        "429": { description: Rate limit exceeded }

  /sandbox:
    get:
      tags: [Sandbox]
      summary: Get current sandbox droplet status
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox:
                    oneOf:
                      - { $ref: "#/components/schemas/SaasSandbox" }
                      - { type: "null" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — hosts.manage required }
    post:
      tags: [Sandbox]
      summary: Provision a sandbox droplet (idempotent)
      security:
        - SessionCookie: []
      responses:
        "202":
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SaasSandbox" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — admin role required }
        "500": { description: provision_failed }
        "503": { description: not_configured (DO_API_TOKEN missing) }
    delete:
      tags: [Sandbox]
      summary: Destroy the active sandbox droplet
      security:
        - SessionCookie: []
      responses:
        "204": { description: Destroyed }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — admin role required }
        "404": { description: not_found }
        "500": { description: destroy_failed }

  /settings/byok:
    get:
      tags: [Settings]
      summary: BYOK (customer-managed KMS) status
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantKmsStatus" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — secrets.manage required }
    post:
      tags: [Settings]
      summary: Configure tenant BYOK provider (with optional verify round-trip)
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, keyRef]
              properties:
                provider: { type: string, enum: [awskms, vault] }
                keyRef: { type: string, minLength: 1, maxLength: 512 }
                verify: { type: boolean, default: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { $ref: "#/components/schemas/TenantKmsStatus" }
                  verify:
                    oneOf:
                      - { $ref: "#/components/schemas/TenantKmsVerifyResult" }
                      - { type: "null" }
        "400": { description: byok_disabled, validation_failed, invalid_json, or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
    delete:
      tags: [Settings]
      summary: Soft-disable BYOK and fall back to platform KMS
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { $ref: "#/components/schemas/TenantKmsStatus" }
        "400": { description: legacy mode (not_supported) }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }

  /settings/byok/verify:
    post:
      tags: [Settings]
      summary: Re-run BYOK round-trip on existing tenant config
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  verify: { $ref: "#/components/schemas/TenantKmsVerifyResult" }
                  status: { $ref: "#/components/schemas/TenantKmsStatus" }
        "400": { description: byok_disabled or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: not_configured }

  /settings/notifications:
    get:
      tags: [Settings]
      summary: Read tenant alert routing overrides
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: object
                    properties:
                      alertEmailTo: { type: string, nullable: true }
                      webhookUrls: { type: string, description: comma-joined list }
                      slackWebhookUrl: { type: string, nullable: true }
                      pdRoutingKey: { type: string, nullable: true, description: masked when set }
                      driftDigestCadence: { type: string, enum: [off, daily, weekly], nullable: true }
                  requestId: { type: string }
        "400": { description: legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — settings.write required }
        "429": { description: Rate limit exceeded }
    put:
      tags: [Settings]
      summary: Replace tenant alert routing overrides
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alertEmailTo: { type: string, format: email, nullable: true }
                webhookUrls:
                  type: array
                  items: { type: string, format: uri }
                  nullable: true
                slackWebhookUrl: { type: string, format: uri, nullable: true }
                pdRoutingKey: { type: string, nullable: true }
                driftDigestCadence: { type: string, enum: [off, daily, weekly], nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  requestId: { type: string }
        "400": { description: validation_failed, invalid_json, or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /settings/retention:
    get:
      tags: [Settings]
      summary: Read tenant retention policy
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — settings.write required }
        "429": { description: Rate limit exceeded }
    put:
      tags: [Settings]
      summary: Update tenant retention policy
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                driftEventsDays: { type: integer, minimum: 0, maximum: 36500, nullable: true }
                baselineSnapshotsDays: { type: integer, minimum: 0, maximum: 36500, nullable: true }
                auditEventsDays: { type: integer, minimum: 0, maximum: 36500, nullable: true }
                evidenceBundlesDays: { type: integer, minimum: 0, maximum: 36500, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "400": { description: validation_failed, invalid_json, or legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }

  /settings/scim:
    get:
      tags: [Settings]
      summary: SCIM 2.0 provisioning status (no bearer returned)
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  clerkOrgId: { type: string }
                  scimBaseUrl: { type: string }
                  recommendedRotationDays: { type: integer }
                  manageUrl: { type: string, format: uri }
                  upgradeUrl: { type: string, format: uri, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }
        "501": { description: not_supported (legacy mode) }

  /settings/sso:
    get:
      tags: [Settings]
      summary: SAML SSO connection status for the Clerk organisation
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  clerkOrgId: { type: string }
                  connections:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        provider: { type: string }
                        domain: { type: string, nullable: true }
                        active: { type: boolean }
                        syncUserAttributes: { type: boolean }
                        acsUrl: { type: string, format: uri }
                        spEntityId: { type: string }
                  manageUrl: { type: string, format: uri }
                  upgradeUrl: { type: string, format: uri, nullable: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }
        "501": { description: not_supported (legacy mode) }

  /settings/webhooks/signing-key:
    get:
      tags: [Settings]
      summary: Webhook signing-key fingerprint and rotation status
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { $ref: "#/components/schemas/SigningKeyStatus" }
                  requestId: { type: string }
        "400": { description: legacy mode (not_supported) }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — settings.write required }
    post:
      tags: [Settings]
      summary: Rotate the tenant webhook signing key (raw key shown once)
      security:
        - SessionCookie: []
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  newKey: { type: string }
                  fingerprint: { type: string }
                  rotatedAt: { type: string, format: date-time }
                  overlapHours: { type: integer }
                  requestId: { type: string }
        "400": { description: legacy mode }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "429": { description: Rate limit exceeded }
        "500": { description: rotation_failed }

  /janitor/accounts:
    get:
      tags: [Charon]
      summary: List linked cloud accounts (Charon)
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Accounts and entitlements (each account may include lastScanDiff vs prior successful scan)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401": { description: Unauthenticated }
    post:
      tags: [Charon]
      summary: Link or update a cloud account for Charon scans
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Account saved
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }

  /janitor/scan:
    post:
      tags: [Charon]
      summary: Enqueue or run inline Charon inventory scan
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountId]
              properties:
                accountId: { type: string, format: uuid }
      responses:
        "200":
          description: Queued or completed
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { description: Unauthenticated }

  /janitor/policies:
    get:
      tags: [Charon]
      summary: Get workspace Charon policy JSON
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: object
                    additionalProperties: true
                    description: >
                      May include excludeTagsLower, protectTagsExtraLower, minIdleScore,
                      emailDigestOnScan, webhookOnScan, and future keys.
    patch:
      tags: [Charon]
      summary: Update Charon policies (partial merge)
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                excludeTagsLower:
                  type: array
                  items: { type: string }
                protectTagsExtraLower:
                  type: array
                  items: { type: string }
                minIdleScore:
                  type: number
                  nullable: true
                  minimum: 0
                  maximum: 100
                emailDigestOnScan: { type: boolean }
                webhookOnScan:
                  type: boolean
                  description: When true, POST charon.scan.completed to tenant webhook URLs after each successful scan (HMAC-signed).
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies: { type: object, additionalProperties: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — SaaS only or missing janitor.manage }
        "429": { description: Rate limit exceeded }

  /janitor/findings:
    get:
      tags: [Charon]
      summary: Paginated Charon findings
      security:
        - SessionCookie: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          description: Capped at 50 per response
          schema: { type: integer, minimum: 1, maximum: 50, default: 50 }
        - name: accountId
          in: query
          schema: { type: string, format: uuid }
        - name: resourceType
          in: query
          schema: { type: string }
        - name: minScore
          in: query
          schema: { type: integer, minimum: 0, maximum: 100 }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /janitor/findings/suppress:
    post:
      tags: [Charon]
      summary: Dismiss or snooze a finding (persists across rescans)
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [findingId, kind]
              additionalProperties: false
              properties:
                findingId: { type: string, format: uuid }
                kind:
                  type: string
                  enum: [dismiss, snooze]
                snoozeDays:
                  type: integer
                  minimum: 1
                  maximum: 365
                  description: Days to snooze (default 7 when kind is snooze)
                note: { type: string, maxLength: 500 }
      responses:
        "200":
          description: Suppression saved
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, const: true }
        "400": { description: Invalid body or snooze window }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Finding not found }
        "429": { description: Rate limit exceeded }
        "500": { description: Internal error }

  /janitor/suppressions:
    get:
      tags: [Charon]
      summary: List dismiss/snooze suppressions for the workspace
      security:
        - SessionCookie: []
      parameters:
        - name: accountId
          in: query
          required: false
          schema: { type: string, format: uuid }
          description: When set, only suppressions scoped to this linked account
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  suppressions:
                    type: array
                    items: { type: object, additionalProperties: true }
        "401": { description: Unauthenticated }
        "429": { description: Rate limit exceeded }
    delete:
      tags: [Charon]
      summary: Remove a suppression by id (resource may reappear on the next scan)
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden }
        "404": { description: Suppression not found }
        "429": { description: Rate limit exceeded }

  /janitor/cleanup-requests:
    get:
      tags: [Charon]
      summary: List Charon cleanup queue rows for the tenant
      security:
        - SessionCookie: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items: { type: object, additionalProperties: true }
        "401": { description: Unauthenticated }
        "429": { description: Rate limit exceeded }

  /janitor/do/scan:
    post:
      tags: [Charon]
      summary: Legacy alias for POST /janitor/scan (enqueue or run inline scan)
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountId]
              properties:
                accountId: { type: string, format: uuid }
      responses:
        "200":
          description: Queued or completed
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { description: Unauthenticated }
        "403": { description: Forbidden — legacy mode or SaaS-only }
        "429": { description: Rate limit exceeded }

  /janitor/cleanup:
    post:
      tags: [Charon]
      summary: Queue Charon cleanup requests (HITL)
      security:
        - SessionCookie: []
      responses:
        "202":
          description: Requests created
        "401": { description: Unauthenticated }

  /janitor/cleanup/approve:
    post:
      tags: [Charon]
      summary: Approve or reject a pending Charon cleanup request
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Applied
        "401": { description: Unauthenticated }

  /janitor/slack:
    post:
      tags: [Charon]
      summary: Slack interactivity endpoint for Charon (signed payloads)
      responses:
        "200":
          description: Slack acknowledgment JSON
        "401": { description: Bad signature }

components:
  parameters:
    hostId:
      name: hostId
      in: path
      required: true
      schema: { type: string }

  securitySchemes:
    BearerIngestKey:
      type: http
      scheme: bearer
      description: INGEST_API_KEY bearer token for push-agent endpoints
    SessionCookie:
      type: apiKey
      in: cookie
      name: bg-session
      description: >
        Signed session cookie (legacy auth) or Clerk session token
        (when CLERK_AUTH_ENABLED=true). All authenticated console API
        paths require one of these. Clerk issues __session cookie;
        the server inspects CLERK_AUTH_ENABLED to pick the verification path.

  schemas:
    HostSnapshot:
      type: object
      required: [hostId, hostname, collectedAt, listeners, users, sudoers, cron, services, ssh, firewall]
      properties:
        hostId: { type: string }
        hostname: { type: string }
        collectedAt: { type: string, format: date-time }
        listeners:
          type: array
          items:
            type: object
            properties:
              proto: { type: string }
              port: { type: integer }
              bind: { type: string }
              process: { type: string, nullable: true }
        users:
          type: array
          items:
            type: object
            properties:
              username: { type: string }
              uid: { type: integer }
              gid: { type: integer }
              shell: { type: string }
        sudoers: { type: array, items: { type: object, additionalProperties: true } }
        cron: { type: array, items: { type: object, additionalProperties: true } }
        services: { type: array, items: { type: object, additionalProperties: true } }
        ssh: { type: object, additionalProperties: true }
        firewall: { type: object, additionalProperties: true }

    Host:
      type: object
      properties:
        id: { type: string }
        hostname: { type: string }
        os: { type: string }
        tags:
          type: array
          items: { type: string }
        last_scan_at: { type: string, format: date-time, nullable: true }
        trust_summary:
          type: string
          enum: [aligned, drift, critical, unknown]

    HostDetail:
      allOf:
        - { $ref: "#/components/schemas/Host" }
        - type: object
          properties:
            baseline_id: { type: string, nullable: true }
            category_counts:
              type: object
              additionalProperties: { type: integer }

    Baseline:
      type: object
      properties:
        id: { type: string }
        host_id: { type: string }
        label: { type: string }
        created_at: { type: string, format: date-time }
        scan_id: { type: string }
        tags:
          type: array
          items: { type: string }

    ScanJob:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed] }
        host_ids:
          type: array
          items: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        drift_count: { type: integer, nullable: true, description: Number of drift events found (real scans only) }
        detail: { type: string, nullable: true, description: Human-readable status message or error detail }
        error: { type: string, nullable: true }

    DriftFinding:
      type: object
      properties:
        id: { type: string }
        host_id: { type: string }
        scan_id: { type: string }
        category:
          type: string
          enum:
            - network_exposure
            - identity
            - persistence
            - ssh
            - firewall
            - packages
        severity:
          type: string
          enum: [high, medium, low]
        lifecycle:
          type: string
          enum: [new, triaged, accepted_risk, remediated, verified]
        title: { type: string }
        rationale: { type: string }
        evidence:
          type: object
          additionalProperties: true
        baseline_path: { type: string, description: JSON pointer / path in baseline snapshot }

    DiffResult:
      type: object
      properties:
        host_id: { type: string }
        baseline_id: { type: string }
        scan_id: { type: string }
        changes:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              rule_id: { type: string, nullable: true }
              severity: { type: string }
              summary: { type: string }
              before: {}
              after: {}
              before_sha256: { type: string, nullable: true }
              after_sha256: { type: string, nullable: true }

    EvidenceBundleJob:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [queued, packaging, ready, failed] }
        download_url: { type: string, format: uri, nullable: true }
        sha256: { type: string, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }

    ApiKeyView:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        scopes:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string, nullable: true }

    DataExportView:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [queued, running, ready, failed, expired] }
        requestedBy: { type: string, nullable: true }
        deliverTo: { type: string, format: email, nullable: true }
        sizeBytes: { type: integer, nullable: true }
        errorMessage: { type: string, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        downloadUrl: { type: string, format: uri, nullable: true }

    PolicyRule:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        category:
          type: string
          enum: [ssh, network_exposure, firewall, packages, integrity, identity, privilege_escalation, persistence]
        conditionKey: { type: string }
        conditionValue: { type: string }
        severity: { type: string, enum: [high, medium, low] }
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        createdBy: { type: string, nullable: true }

    RemediationView:
      type: object
      properties:
        id: { type: string }
        remediationId: { type: string }
        status:
          type: string
          enum: [pending, plan_ready, sandbox_verified, approved, rejected, applied, failed]
        riskPolicyTier:
          type: string
          enum: [guidance_only, sandbox_verified_suggestion, approval_required, manual_only]
        summary: { type: string, nullable: true }
        plan:
          type: object
          additionalProperties: true
        driftEventId: { type: string }
        hostId: { type: string }
        scanId: { type: string, nullable: true }
        approvedBy: { type: string, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SaasAuditEventView:
      type: object
      properties:
        id: { type: string }
        actorUserId: { type: string, nullable: true }
        action: { type: string }
        targetType: { type: string, nullable: true }
        targetId: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        createdAt: { type: string, format: date-time }

    SaasSandbox:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        dropletId: { type: string, nullable: true }
        dropletIp: { type: string, nullable: true }
        region: { type: string }
        hostId: { type: string, nullable: true }
        credentialId: { type: string, nullable: true }
        status:
          type: string
          enum: [provisioning, active, expired, error, destroying]
        ttlExpiresAt: { type: string, format: date-time, nullable: true }
        seedPhase: { type: integer, description: 0=clean, increments per drift seed }
        driftSeededAt: { type: string, format: date-time, nullable: true }
        errorMessage: { type: string, nullable: true }
        firewallId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TenantKmsStatus:
      type: object
      properties:
        byokEnabled: { type: boolean }
        configured: { type: boolean }
        provider: { type: string, enum: [awskms, vault], nullable: true }
        keyRef: { type: string, nullable: true }
        lastVerifiedAt: { type: string, format: date-time, nullable: true }
        lastVerifyError: { type: string, nullable: true }

    TenantKmsVerifyResult:
      oneOf:
        - type: object
          required: [ok, verifiedAt]
          properties:
            ok: { const: true }
            verifiedAt: { type: string, format: date-time }
        - type: object
          required: [ok, error]
          properties:
            ok: { const: false }
            error: { type: string }

    RetentionPolicy:
      type: object
      properties:
        driftEventsDays: { type: integer, nullable: true }
        baselineSnapshotsDays: { type: integer, nullable: true }
        auditEventsDays: { type: integer, nullable: true }
        evidenceBundlesDays: { type: integer, nullable: true }

    SigningKeyStatus:
      type: object
      properties:
        hasKey: { type: boolean }
        fingerprint: { type: string, nullable: true }
        previousFingerprint: { type: string, nullable: true }
        rotatedAt: { type: string, format: date-time, nullable: true }
        previousActive: { type: boolean }
        overlapHours: { type: integer }
