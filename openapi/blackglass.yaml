openapi: 3.1.0
info:
  title: BLACKGLASS API
  version: 0.1.0
  description: >
    Operational integrity API — hosts, baselines, scans, drift findings,
    evidence bundles, and reports. Idempotent reads; scan jobs are asynchronous.

servers:
  - url: https://api.blackglass.invalid/v1
    description: Production (stub host)
  - url: https://console.blackglass.invalid/api/v1
    description: SaaS console API prefix (Next.js `/api/v1`, Clerk session)

tags:
  - name: Hosts
  - name: Baselines
  - name: Scans
  - name: Drift
  - name: Evidence
  - name: Reports
  - name: Ingest

paths:
  /api/health:
    servers:
      - url: https://console.blackglass.invalid
        description: Next.js app origin (not under `/v1`)
    get:
      tags: [Hosts]
      summary: Liveness, baseline store, collector diagnostics
      parameters:
        - name: probe
          in: query
          description: Pass `secrets` for a lightweight secret-backend reachability probe
          schema: { type: string, enum: [secrets] }
      responses:
        "200":
          description: Health JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string }
                  diagnostics_scope:
                    type: string
                    description: >
                      runtime_configuration = env/collector readiness only (no secret fetch).
                      With ?probe=secrets, adds secret_backend_reachability and includes secrets_probe.
                  baseline_store: { nullable: true }
                  collector: { type: object }
                  secrets_probe: { type: object, nullable: true }

  /fleet/snapshot:
    get:
      tags: [Hosts]
      summary: Fleet KPI snapshot including collector coverage
      responses:
        "200":
          description: Snapshot payload
          content:
            application/json:
              schema: { type: object }

  /audit/events:
    get:
      tags: [Hosts]
      summary: Recent audit entries (demo stub)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 80, maximum: 200 }
        - name: action
          in: query
          description: Case-insensitive substring match on audit action
          schema: { type: string }
        - name: since
          in: query
          description: ISO-8601 timestamp — only events on or after this instant
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Tail of audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        ts: { type: string, format: date-time }
                        action: { type: string }
                        detail: { type: string }
                        actor: { type: string, nullable: true }
                        scan_id: { type: string, nullable: true }
    post:
      tags: [Hosts]
      summary: Append audit entry (demo stub)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, detail]
              properties:
                action: { type: string }
                detail: { type: string }
                actor: { type: string }
                scan_id: { type: string, description: "Optional correlation with scan jobs" }
      responses:
        "201":
          description: Record created
        "400":
          description: Invalid body
        "429":
          description: Audit-append rate limit

  /hosts:
    get:
      tags: [Hosts]
      summary: List hosts in workspace
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated hosts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Host" }
                  next_cursor: { type: string, nullable: true }

  /baselines:
    get:
      tags: [Baselines]
      summary: List captured baselines (summary per host)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  baselines:
                    type: array
                    items:
                      type: object
                      properties:
                        hostId: { type: string }
                        hostname: { type: string }
                        capturedAt: { type: string, format: date-time }
                        listenersCount: { type: integer }
                        usersCount: { type: integer }
                        servicesCount: { type: integer }
    post:
      tags: [Baselines]
      summary: Capture baselines for all configured collector hosts
      description: >
        Collects SSH snapshots from every COLLECTOR_HOST_N in parallel. Saves each
        successful baseline; partial failures are listed under `failed`.
      responses:
        "200":
          description: At least one host captured successfully
          content:
            application/json:
              schema:
                type: object
                required: [captured]
                properties:
                  captured:
                    type: array
                    items:
                      type: object
                      properties:
                        hostId: { type: string }
                        hostname: { type: string }
                        capturedAt: { type: string, format: date-time }
                        listenersCount: { type: integer }
                        usersCount: { type: integer }
                        servicesCount: { type: integer }
                        sudoers: {}
                        cronEntries:
                          type: array
                          items: { type: string }
                        sshConfig: {}
                        firewallActive: { type: boolean }
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        hostId: { type: string }
                        detail: { type: string }
        "502":
          description: Every host failed collection
        "503":
          description: Collector not configured (missing COLLECTOR_HOST_1 or SSH_PRIVATE_KEY)

  /hosts/{hostId}:
    get:
      tags: [Hosts]
      summary: Get host detail and latest posture summary
      parameters:
        - $ref: "#/components/parameters/hostId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HostDetail" }
        "404": { description: Host not found }

  /hosts/{hostId}/baselines:
    get:
      tags: [Baselines]
      summary: List baseline snapshots for a host
      parameters:
        - $ref: "#/components/parameters/hostId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Baseline" }

    post:
      tags: [Baselines]
      summary: Create baseline from latest successful scan
      parameters:
        - $ref: "#/components/parameters/hostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label: { type: string }
                tags:
                  type: array
                  items: { type: string }
                scan_id: { type: string, description: Optional scan to pin; default latest }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Baseline" }

  /scans:
    post:
      tags: [Scans]
      summary: Enqueue scan job for one or more hosts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host_ids]
              properties:
                host_ids:
                  type: array
                  items: { type: string }
                profile: { type: string, enum: [full, quick], default: full }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanJob" }
        "503":
          description: Scan enqueue disabled (FEATURE_SCANS_DISABLED) or dependency unavailable

  /scans/{scanId}:
    get:
      tags: [Scans]
      summary: Get scan job status and progress
      parameters:
        - name: scanId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanJob" }

  /drift:
    get:
      tags: [Drift]
      summary: List all drift events across the fleet
      description: >
        Returns real drift events when the collector is configured and a scan
        has been completed; falls back to mock data otherwise.
      parameters:
        - name: hostId
          in: query
          schema: { type: string }
          description: Filter to a specific host
        - name: lifecycle
          in: query
          schema: { type: string, enum: [new, triaged, accepted_risk, remediated, verified] }
        - name: limit
          in: query
          schema: { type: integer, default: 100, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          description: Opaque pagination cursor from previous `next_cursor`
          schema: { type: string }
      responses:
        "200":
          description: Drift event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DriftFinding" }
                  total: { type: integer }
                  next_cursor:
                    type: string
                    nullable: true
                    description: Present when more pages exist

  /hosts/{hostId}/drift:
    get:
      tags: [Drift]
      summary: List drift findings for host (latest scan vs active baseline)
      parameters:
        - $ref: "#/components/parameters/hostId"
        - name: severity
          in: query
          schema: { type: string, enum: [high, medium, low] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DriftFinding" }

  /drift/{findingId}:
    get:
      tags: [Drift]
      summary: Get drift finding detail (evidence excerpts)
      parameters:
        - name: findingId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriftFinding" }

  /hosts/{hostId}/diff:
    get:
      tags: [Drift]
      summary: Unified baseline vs current structured diff
      parameters:
        - $ref: "#/components/parameters/hostId"
        - name: baseline_id
          in: query
          schema: { type: string }
        - name: scan_id
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DiffResult" }

  /evidence/bundles:
    post:
      tags: [Evidence]
      summary: Create evidence bundle export job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: object
                  properties:
                    host_ids:
                      type: array
                      items: { type: string }
                    fleet_tags:
                      type: array
                      items: { type: string }
                time_range:
                  type: object
                  properties:
                    from: { type: string, format: date-time }
                    to: { type: string, format: date-time }
                include:
                  type: object
                  properties:
                    findings_json: { type: boolean, default: true }
                    summary_md: { type: boolean, default: true }
                    config_excerpts: { type: boolean, default: false }
                case_id: { type: string }
                notes: { type: string }
      responses:
        "202":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceBundleJob" }

  /evidence/bundles/{bundleId}:
    get:
      tags: [Evidence]
      summary: Get bundle job status or download URL when ready
      parameters:
        - name: bundleId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceBundleJob" }

  /api/v1/ingest:
    servers:
      - url: https://console.blackglass.invalid
        description: Next.js app origin (not under `/v1`)
    post:
      tags: [Ingest]
      summary: Push-agent snapshot ingest
      description: >
        Lightweight agents installed on monitored hosts call this endpoint to
        push their collected snapshot over HTTPS (pull-model alternative for
        hosts in strict VPCs). When `INGEST_API_KEY` is set it is the default
        Bearer secret; optional `INGEST_HOST_KEYS_JSON` maps `hostId` to a
        per-host Bearer for compromised-key blast-radius reduction.
        When INGEST_SAAS_TENANT_ID is set, the server enforces the tenant's host
        allowance before accepting a snapshot for a **new** host_id.
      security:
        - BearerIngestKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostSnapshot"
      responses:
        "200":
          description: Snapshot accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  hostId: { type: string }
                  capturedAt: { type: string, format: date-time }
        "401":
          description: Missing or invalid Bearer token
        "429":
          description: Rate limit exceeded for this host_id
        "403":
          description: Tenant ingest scope or host allowance blocked the snapshot
        "503":
          description: INGEST_API_KEY not configured on this instance

  /reports:
    post:
      tags: [Reports]
      summary: Generate integrity report
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                fleet_tags: { type: array, items: { type: string } }
                period: { type: string, description: ISO-8601 interval or preset }
                format: { type: string, enum: [markdown, pdf], default: markdown }
      responses:
        "202":
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id: { type: string }
                  status: { type: string, enum: [queued, running, ready, failed] }

components:
  parameters:
    hostId:
      name: hostId
      in: path
      required: true
      schema: { type: string }

  securitySchemes:
    BearerIngestKey:
      type: http
      scheme: bearer
      description: INGEST_API_KEY bearer token for push-agent endpoints

  schemas:
    HostSnapshot:
      type: object
      required: [hostId, hostname, collectedAt, listeners, users, sudoers, cron, services, ssh, firewall]
      properties:
        hostId: { type: string }
        hostname: { type: string }
        collectedAt: { type: string, format: date-time }
        listeners:
          type: array
          items:
            type: object
            properties:
              proto: { type: string }
              port: { type: integer }
              bind: { type: string }
              process: { type: string, nullable: true }
        users:
          type: array
          items:
            type: object
            properties:
              username: { type: string }
              uid: { type: integer }
              gid: { type: integer }
              shell: { type: string }
        sudoers: { type: array, items: { type: object, additionalProperties: true } }
        cron: { type: array, items: { type: object, additionalProperties: true } }
        services: { type: array, items: { type: object, additionalProperties: true } }
        ssh: { type: object, additionalProperties: true }
        firewall: { type: object, additionalProperties: true }

    Host:
      type: object
      properties:
        id: { type: string }
        hostname: { type: string }
        os: { type: string }
        tags:
          type: array
          items: { type: string }
        last_scan_at: { type: string, format: date-time, nullable: true }
        trust_summary:
          type: string
          enum: [aligned, drift, critical, unknown]

    HostDetail:
      allOf:
        - { $ref: "#/components/schemas/Host" }
        - type: object
          properties:
            baseline_id: { type: string, nullable: true }
            category_counts:
              type: object
              additionalProperties: { type: integer }

    Baseline:
      type: object
      properties:
        id: { type: string }
        host_id: { type: string }
        label: { type: string }
        created_at: { type: string, format: date-time }
        scan_id: { type: string }
        tags:
          type: array
          items: { type: string }

    ScanJob:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed] }
        host_ids:
          type: array
          items: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        drift_count: { type: integer, nullable: true, description: Number of drift events found (real scans only) }
        detail: { type: string, nullable: true, description: Human-readable status message or error detail }
        error: { type: string, nullable: true }

    DriftFinding:
      type: object
      properties:
        id: { type: string }
        host_id: { type: string }
        scan_id: { type: string }
        category:
          type: string
          enum:
            - network_exposure
            - identity
            - persistence
            - ssh
            - firewall
            - packages
        severity:
          type: string
          enum: [high, medium, low]
        lifecycle:
          type: string
          enum: [new, triaged, accepted_risk, remediated, verified]
        title: { type: string }
        rationale: { type: string }
        evidence:
          type: object
          additionalProperties: true
        baseline_path: { type: string, description: JSON pointer / path in baseline snapshot }

    DiffResult:
      type: object
      properties:
        host_id: { type: string }
        baseline_id: { type: string }
        scan_id: { type: string }
        changes:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              rule_id: { type: string, nullable: true }
              severity: { type: string }
              summary: { type: string }
              before: {}
              after: {}
              before_sha256: { type: string, nullable: true }
              after_sha256: { type: string, nullable: true }

    EvidenceBundleJob:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [queued, packaging, ready, failed] }
        download_url: { type: string, format: uri, nullable: true }
        sha256: { type: string, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
