# Local Postgres + Redis for Blackglass development.
# See docs/operations/local-dev-docker.md for wiring into `.env.local` and migrations.
#
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down

services:
  postgres:
    image: postgres:16-alpine
    container_name: blackglass-dev-postgres
    environment:
      POSTGRES_USER: blackglass
      POSTGRES_PASSWORD: blackglass
      POSTGRES_DB: blackglass
    ports:
      - "5432:5432"
    volumes:
      - blackglass_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackglass -d blackglass"]
      interval: 5s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: blackglass-dev-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8

volumes:
  blackglass_pg_data:
