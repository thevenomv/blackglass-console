# Maintenance — scheduled pruning jobs for audit events and webhook idempotency keys.
#
# Both scripts read DATABASE_URL + DO_SPACES_* from repository secrets and prune
# stale rows per the retention policy in docs/data-retention-saas.md.
#
# Schedule: Sundays 02:00 UTC (low-traffic window).
# Manual dispatch: run either job individually via Actions → Run workflow.
#
# Required secrets (set under Settings → Secrets and variables → Actions):
#   DATABASE_URL              — Postgres connection string for SaaS DB
#   DO_SPACES_KEY             — Spaces access key (if Spaces audit adapter is in use)
#   DO_SPACES_SECRET          — Spaces secret
#   DO_SPACES_REGION          — e.g. nyc3
#   DO_SPACES_BUCKET          — e.g. blackglass-state
#   AUDIT_RETENTION_DAYS      — optional override (default defined in prune script)
#   WEBHOOK_RETENTION_DAYS    — optional override (default defined in prune script)
name: "Maintenance — prune stale data"

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Which pruning job to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - audit-events
          - webhook-idempotency
          - billing
          - trial-emails

  schedule:
    # Sundays 02:00 UTC — heavy maintenance (prune + reconcile)
    - cron: "0 2 * * 0"
    # Daily 08:00 UTC — trial lifecycle emails
    - cron: "0 8 * * *"

jobs:
  prune-audit-events:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'both' ||
      github.event.inputs.job == 'audit-events'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Prune saas_audit_events
        run: node scripts/prune-saas-audit-events.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          AUDIT_RETENTION_DAYS: ${{ secrets.AUDIT_RETENTION_DAYS }}

  prune-webhook-idempotency:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'both' ||
      github.event.inputs.job == 'webhook-idempotency'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Prune webhook idempotency keys
        run: node scripts/prune-webhook-idempotency.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEBHOOK_RETENTION_DAYS: ${{ secrets.WEBHOOK_RETENTION_DAYS }}

  reconcile-billing:
    runs-on: ubuntu-latest
    # Runs on schedule (Sundays) and on manual dispatch with job=both or job=billing.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'both' ||
      github.event.inputs.job == 'billing'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Check required secrets
        id: check-reconcile
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ] || [ -z "${{ secrets.STRIPE_SECRET_KEY }}" ]; then
            echo "::notice::Billing reconcile skipped — set DATABASE_URL and STRIPE_SECRET_KEY repo secrets to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Reconcile SaaS billing (Stripe vs Postgres)
        if: steps.check-reconcile.outputs.skip != 'true'
        run: node scripts/reconcile-saas-billing.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          RECONCILE_CLERK_ORGS: "1"
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}

  trial-lifecycle-emails:
    runs-on: ubuntu-latest
    # Runs every day (08:00 UTC schedule) and on manual dispatch.
    # The script uses time-window queries so running on the Sunday prune schedule
    # is harmless — Resend idempotency keys prevent duplicate sends on the same day.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'both' ||
      github.event.inputs.job == 'trial-emails'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Check required secrets
        id: check-trial-emails
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$DATABASE_URL" ] || [ -z "$CLERK_SECRET_KEY" ]; then
            echo "::notice::Trial lifecycle emails skipped — set RESEND_API_KEY, DATABASE_URL and CLERK_SECRET_KEY to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Send trial lifecycle emails
        if: steps.check-trial-emails.outputs.skip != 'true'
        run: node scripts/send-trial-lifecycle-emails.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          APP_URL: ${{ vars.APP_URL || 'https://blackglasssec.com' }}
