# Weekly unattended checks: workflow script path parity + Resend domain table.
# Also runnable via workflow_dispatch.
#
# Does not send email or touch production data (except Resend read-only domains list).

name: Ops weekly self-check

on:
  schedule:
    - cron: "15 7 * * 1" # Mondays 07:15 UTC (after Dependabot Monday 08:00 in other TZ overlap is fine)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  script-path-parity:
    runs-on: [self-hosted, linux, obsidian]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Verify workflow → script references
        run: node scripts/verify/ops-automation-selfcheck.mjs

  resend-domains:
    runs-on: [self-hosted, linux, obsidian]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Resend domain verification status
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "${RESEND_API_KEY}" ]; then
            echo "## Resend domains" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped — \`RESEND_API_KEY\` repository secret is not set." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node scripts/email/resend-domain-status.mjs
