name: "Apply database migrations"

# Manual-trigger workflow that applies any pending Drizzle migrations to the
# production DigitalOcean managed Postgres. Idempotent and safe to re-run —
# `scripts/ops/apply-migrations.mjs` only applies migrations whose sha256 hash
# is not already recorded in `drizzle.__drizzle_migrations`.
#
# Required repo secrets:
#   DATABASE_URL  — production Postgres connection string
#   DO_API_TOKEN  — DigitalOcean API token (to manage the DB firewall)
#
# DO DB cluster: 4d063be8-1cc1-4b45-8b57-2a96a9c77161
#
# Usage:
#   - Default (no input): dry-run via `--check`. Exits non-zero if anything
#     is pending. Use this to verify drift without touching the DB.
#   - mode=apply: runs the migrator. Each migration runs in its own
#     transaction; failure rolls back and the runner exits 1.
#   - mode=baseline: marks every file as recorded WITHOUT running the SQL.
#     Use only when adopting a database whose schema was applied by hand
#     (this was the recovery path used after the 2026-05-07 incident).
#   - mode=status: prints the applied/pending list and exits 0.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to do"
        required: true
        default: "check"
        type: choice
        options: [check, apply, baseline, status]

jobs:
  migrate:
    runs-on: [self-hosted, linux, obsidian]
    env:
      DO_DB_CLUSTER_ID: "4d063be8-1cc1-4b45-8b57-2a96a9c77161"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --omit=dev

      # --- Firewall: open -------------------------------------------------------
      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to DO DB trusted sources
        run: |
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/databases/$DO_DB_CLUSTER_ID/firewall" \
            | jq '[.rules[] | {type,value}]')

          NEW=$(echo "$EXISTING" | jq \
            --arg ip "$RUNNER_IP" \
            '. + [{type:"ip_addr",value:$ip}]')

          curl -sf -X PUT \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"rules\":$NEW}" \
            "https://api.digitalocean.com/v2/databases/$DO_DB_CLUSTER_ID/firewall"
        env:
          DO_TOKEN: ${{ secrets.DO_API_TOKEN }}
          RUNNER_IP: ${{ steps.runner_ip.outputs.ip }}

      - name: Wait for firewall propagation
        run: sleep 15

      # --- Run the migrator ----------------------------------------------------
      # NOTE: migration-008 (ALTER TYPE subscription_status ADD VALUE 'past_due')
      # must run BEFORE the main migrator because ALTER TYPE cannot run inside a
      # transaction (which apply-migrations.mjs uses). run-migration-008.mjs is
      # idempotent (IF NOT EXISTS) and safe to re-run on every deploy.
      - name: Apply enum migration (past_due — must run outside transaction)
        if: inputs.mode == 'apply'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_NO_WARNINGS: "1"
        run: node scripts/db/run-migration-008.mjs

      - name: Run migrations (${{ inputs.mode }})
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_NO_WARNINGS: "1"
        run: |
          case "${{ inputs.mode }}" in
            check)    node scripts/ops/apply-migrations.mjs --check ;;
            apply)    node scripts/ops/apply-migrations.mjs ;;
            baseline) node scripts/ops/apply-migrations.mjs --baseline ;;
            status)   node scripts/ops/apply-migrations.mjs --status ;;
            *) echo "::error::unknown mode '${{ inputs.mode }}'"; exit 2 ;;
          esac

      # --- Firewall: close (always) -------------------------------------------
      - name: Remove runner IP from DO DB trusted sources
        if: always()
        run: |
          RUNNER_IP="${{ steps.runner_ip.outputs.ip }}"
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/databases/$DO_DB_CLUSTER_ID/firewall" \
            | jq --arg ip "$RUNNER_IP" '[.rules[] | select(.value != $ip) | {type,value}]')

          curl -sf -X PUT \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"rules\":$EXISTING}" \
            "https://api.digitalocean.com/v2/databases/$DO_DB_CLUSTER_ID/firewall"
        env:
          DO_TOKEN: ${{ secrets.DO_API_TOKEN }}
