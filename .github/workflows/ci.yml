name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Passed through Next/Sentry builds so browser + server errors group by deploy.
      SENTRY_RELEASE: ${{ github.sha }}
      NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (high+critical)
        # Moderate postcss CVE GHSA-qx2v-qp2m-jg93 lives inside next/node_modules/postcss
        # (not the root postcss, which is already at >=8.5.10). Fixing it requires a
        # breaking Next downgrade to 9.3.3. --audit-level=high intentionally skips it.
        # Track via .github/dependabot.yml ignore rule; remove when Next ships a patch.
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Migration file layout check
        run: npm run db:migrate:files

      - name: Typecheck
        run: npm run typecheck

      - name: OpenAPI vs route handlers
        run: npm run check:openapi

      - name: Zod schemas export matches committed file
        run: npm run schemas:export && git diff --exit-code openapi/zod-schemas.json

      - name: OpenAPI types codegen drift check
        run: npm run openapi:types && git diff --exit-code src/types/openapi.d.ts

      - name: Unit tests
        run: npm run test:unit

      - name: CycloneDX SBOM artifact
        run: npm run sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sbom
          path: cyclonedx-sbom.json

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
        env:
          CI: true

      - name: End-to-end tests (live SSR, NEXT_PUBLIC_USE_MOCK=false)
        run: npm run test:e2e:live
        env:
          CI: true
          PLAYWRIGHT_LIVE: "1"

  migrations-end-to-end:
    name: Migrations apply cleanly to fresh Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blackglass_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Apply all migrations from scratch
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: blackglass_test
        run: npm run db:migrate

      - name: Verify nothing pending after apply
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: blackglass_test
        run: npm run db:migrate:check

      - name: Re-apply must be no-op (idempotency check)
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: blackglass_test
        run: |
          OUT=$(npm run --silent db:migrate)
          echo "$OUT"
          echo "$OUT" | grep -q "0 pending" || (echo "::error::Re-running migrations was not a no-op" && exit 1)

      # RLS tenant-leak guardrail — runs against the freshly-migrated
      # Postgres above. We must NOT connect as the postgres superuser
      # because superusers (and table owners) bypass RLS unconditionally
      # — so the guardrail would silently pass against any policy.
      # Create a dedicated role that mirrors the production app role
      # (non-superuser, no BYPASSRLS), grant it the minimum needed,
      # and run the test under it.
      - name: Create non-superuser RLS test role
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: blackglass_test
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
            -- Drop and recreate so re-runs on the same DB are idempotent.
            DROP ROLE IF EXISTS rls_test_app;
            CREATE ROLE rls_test_app LOGIN PASSWORD 'rls_test_app'
              NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
            GRANT USAGE ON SCHEMA public TO rls_test_app;
            GRANT SELECT, INSERT, UPDATE, DELETE
              ON ALL TABLES IN SCHEMA public TO rls_test_app;
            GRANT USAGE, SELECT, UPDATE
              ON ALL SEQUENCES IN SCHEMA public TO rls_test_app;
            -- Ensure FORCE ROW LEVEL SECURITY in the test takes effect:
            -- the role is non-superuser and non-BYPASSRLS, so the only
            -- remaining bypass is "owner of the table" which the role
            -- isn't (postgres still owns everything from the migration).
          SQL
      - name: RLS tenant-leak guardrail
        env:
          DATABASE_URL: postgres://rls_test_app:rls_test_app@localhost:5432/blackglass_test
        run: npx vitest run tests/unit/rls-tenant-leak.test.ts --reporter=default

  helm-template:
    name: Helm chart renders cleanly (web + 3 workers)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.14.4

      # Skip `helm lint` — it parses templates as raw YAML before
      # rendering, which trips on perfectly-valid `command: {{ toYaml
      # ... | nindent N }}` patterns. `helm template` is the source of
      # truth; if rendering succeeds, the chart is well-formed.

      - name: Render with sandbox-worker enabled (locks parity)
        run: |
          helm template blackglass deploy/helm/blackglass \
            --namespace blackglass \
            --set image.web.tag=sha-deadbeef \
            --set image.worker.tag=sha-deadbeef \
            --set sandboxWorker.enabled=true \
            --set ingress.host=ci.blackglass.example \
            --set secrets.existingSecret=blackglass-env \
            > rendered.yaml
          # Fail if any of the four expected workloads is missing —
          # this is the regression check that locks the sandbox-worker
          # template into chart parity.
          for w in blackglass-web blackglass-scan-worker blackglass-ops-worker blackglass-sandbox-worker; do
            if ! grep -q "name: $w$" rendered.yaml; then
              echo "::error::Helm chart did not render Deployment '$w'"
              exit 1
            fi
          done
          echo "All four workloads present."

      - name: Render with sandbox-worker disabled (default)
        run: |
          helm template blackglass deploy/helm/blackglass \
            --namespace blackglass \
            --set image.web.tag=sha-deadbeef \
            --set image.worker.tag=sha-deadbeef \
            --set secrets.existingSecret=blackglass-env \
            > rendered-default.yaml
          if grep -q "name: blackglass-sandbox-worker$" rendered-default.yaml; then
            echo "::error::sandbox-worker rendered when sandboxWorker.enabled=false (default)"
            exit 1
          fi
          echo "sandbox-worker correctly absent at default values."

  staging-smoke:
    name: Staging smoke (post-deploy)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only runs on pushes to main — not PRs — and only when STAGING_URL secret is set.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Check STAGING_URL secret
        id: check
        env:
          HAS_URL: ${{ secrets.STAGING_URL != '' }}
        run: |
          if [ "$HAS_URL" != "true" ]; then
            echo "::notice::Staging smoke skipped — set STAGING_URL repo secret to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for DO deployment to go ACTIVE
        if: steps.check.outputs.skip != 'true'
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DO_APP_ID: ${{ secrets.DO_APP_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$DO_API_TOKEN" ] || [ -z "$DO_APP_ID" ]; then
            echo "::notice::DO_API_TOKEN or DO_APP_ID not set — skipping deployment poll, running smoke immediately."
            exit 0
          fi
          echo "Polling DO for deployment of $COMMIT_SHA ..."
          for i in $(seq 1 30); do
            PHASE=$(curl -sf -H "Authorization: Bearer $DO_API_TOKEN" \
              "https://api.digitalocean.com/v2/apps/$DO_APP_ID/deployments?per_page=1" \
              | jq -r '.deployments[0].phase // "UNKNOWN"')
            echo "Attempt $i: phase=$PHASE"
            if [ "$PHASE" = "ACTIVE" ]; then
              echo "Deployment is ACTIVE."
              exit 0
            fi
            if [ "$PHASE" = "ERROR" ] || [ "$PHASE" = "CANCELED" ]; then
              echo "::error::Deployment failed with phase=$PHASE"
              exit 1
            fi
            sleep 20
          done
          echo "::warning::Timed out waiting for DO deployment — running smoke anyway."

      - name: Run staging smoke
        if: steps.check.outputs.skip != 'true'
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: node scripts/verify-staging.mjs
