name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user or operator pain does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: High-level idea; linking to related routes, docs, or OpenAPI paths helps.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Deployment mode (SaaS vs self-hosted), scale, compliance constraints, etc.
