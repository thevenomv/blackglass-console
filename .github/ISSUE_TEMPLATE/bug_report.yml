name: Bug report
description: Something is broken or incorrect (not for security vulnerabilities).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Security issues: see **SECURITY.md** at the repository root — do not file publicly with exploit details.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, environment (OS, Node version), and relevant config flags.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Logs, HTTP status, screenshots if UI — redact secrets and tokens.
    validations:
      required: true
