{{- /*
Chart-managed Secret. Skipped entirely when secrets.existingSecret is
set — in that case the user provisions the Secret through their own
secret-management workflow (Vault, Sealed Secrets, External Secrets
Operator, etc.) and we just envFrom it.

When using inline values, prefer:
  helm install ... --set-string secrets.values.DATABASE_URL=...

For env-file workflows, create the Secret directly:
  kubectl -n blackglass create secret generic blackglass-env \
    --from-env-file=prod.env

then point the chart at it via secrets.existingSecret=blackglass-env.
*/ -}}
{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "blackglass.fullname" . }}-env
  labels:
    {{- include "blackglass.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
