{{- if .Values.web.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "blackglass.fullname" . }}-web
  labels:
    {{- include "blackglass.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "blackglass.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
{{- end }}
